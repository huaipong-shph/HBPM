<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำนวณความดันโลหิต - รพ.สต.ห้วยโป่ง</title>
    <link rel="icon" href="HBP-Cal_2.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen pb-10 flex flex-col items-center">
        <header class="w-full bg-gradient-to-r from-blue-800 to-blue-600 p-6 shadow-lg text-white text-center">
            <h1 class="text-xl font-bold">คำนวณค่าความดันโลหิตที่บ้าน</h1>
            <p class="text-sm text-blue-100 mt-1 font-medium tracking-wide">Home Blood Pressure Monitoring Calculator</p>
            <div class="bg-white text-blue-800 py-1.5 px-5 rounded-full inline-block mt-4 font-bold text-sm shadow-md">
                โรงพยาบาลส่งเสริมสุขภาพตำบลห้วยโป่ง
            </div>
        </header>

        <main class="w-full max-w-4xl mt-8 px-4 space-y-6">
            <div id="step1" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="mb-8 p-5 bg-slate-50 border border-slate-200 rounded-xl">
                    <label class="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                        <i data-lucide="key" class="w-4 h-4 text-amber-500"></i> API Key
                    </label>
                    <div class="flex flex-col sm:flex-row gap-3 items-start">
                        <div class="relative w-full">
                            <input type="password" id="apiKeyInput" placeholder="กรอก API Key ของคุณที่นี่..." class="w-full p-3.5 bg-white border border-slate-300 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" />
                            <button id="toggleKeyBtn" class="absolute right-4 top-3.5 text-slate-400 hover:text-slate-600 transition">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <button id="saveKeyBtn" class="w-full sm:w-auto bg-slate-800 text-white px-6 py-3.5 rounded-xl font-bold hover:bg-slate-900 transition flex items-center justify-center gap-2 whitespace-nowrap shadow-sm">
                            <i data-lucide="save" class="w-4 h-4"></i> บันทึก
                        </button>
                    </div>
                    <div id="saveStatus" class="mt-3 flex items-center gap-2 text-sm font-medium text-teal-600 hidden bg-teal-50 p-2 rounded-lg border border-teal-100">
                        <i data-lucide="check-circle" class="w-4 h-4"></i> สถานะ: บันทึกข้อมูลสำเร็จ
                    </div>
                </div>

                <hr class="border-slate-100 mb-6">

                <input type="file" id="fileInput" class="hidden" accept="image/*" />
                
                <div id="previewArea" class="text-center hidden">
                    <img id="previewImage" src="" class="max-h-64 mx-auto rounded-lg mb-6 object-contain shadow-sm border border-slate-200" />
                    <button id="processBtn" class="w-full bg-blue-600 text-white p-3.5 rounded-xl font-bold flex justify-center items-center gap-2 hover:bg-blue-700 transition shadow-md">
                        วิเคราะห์ข้อมูล
                    </button>
                </div>

                <div id="uploadArea" class="h-56 border-2 border-dashed rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 transition border-blue-200 bg-blue-50/30">
                    <div class="bg-white p-4 rounded-full shadow-sm mb-3">
                        <i data-lucide="camera" class="w-8 h-8 text-blue-500"></i>
                    </div>
                    <p class="text-slate-600 font-medium">แตะเพื่ออัปโหลดภาพตารางความดัน</p>
                    <p class="text-xs text-slate-400 mt-1">รองรับ JPG, PNG</p>
                </div>

                <div id="errorBox" class="hidden mt-6 p-4 bg-rose-50 text-rose-700 rounded-xl text-sm flex items-start gap-3 border border-rose-100">
                    <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i>
                    <span id="errorText" class="leading-relaxed font-medium"></span>
                </div>
            </div>

            <div id="step2" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hidden">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold text-slate-800">ตรวจสอบข้อมูลจากภาพ</h2>
                </div>
                <div class="overflow-x-auto custom-scrollbar border border-slate-200 rounded-xl">
                    <table class="w-full text-center border-collapse text-sm">
                        <thead class="bg-slate-50" id="tableHeader"></thead>
                        <tbody id="tableBody" class="divide-y divide-slate-200"></tbody>
                    </table>
                </div>
                <div class="flex gap-4 mt-6">
                    <button id="backBtn" class="flex-1 bg-slate-100 text-slate-700 p-3.5 rounded-xl font-bold hover:bg-slate-200 transition">ย้อนกลับ</button>
                    <button id="calcBtn" class="flex-1 bg-teal-600 text-white p-3.5 rounded-xl font-bold hover:bg-teal-700 transition shadow-md">คำนวณค่าเฉลี่ย</button>
                </div>
            </div>

            <div id="step3" class="bg-white p-8 rounded-2xl shadow-sm text-center border border-slate-200 max-w-sm mx-auto hidden">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="activity" class="w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">ผลการประเมิน</h2>
                <div class="text-5xl font-bold text-blue-700 my-6 tracking-tight">
                    <span id="resSysDia">0 / 0</span>
                    <span class="block text-base font-medium text-slate-500 mt-2 tracking-normal">mmHg</span>
                </div>
                <div class="bg-slate-50 rounded-xl p-4 mb-4 border border-slate-100">
                    <p class="text-sm text-slate-500 mb-1">สถานะความดันโลหิต</p>
                    <p class="text-xl"><span id="resStatus" class="font-bold text-teal-600">ปกติ</span></p>
                </div>
                <div class="flex items-center justify-center gap-2 text-slate-600 font-medium">
                    <i data-lucide="heart-pulse" class="w-5 h-5 text-rose-500"></i>
                    <span id="resHr">ชีพจร: 0 ครั้ง/นาที</span>
                </div>
                <button id="restartBtn" class="mt-8 bg-slate-800 text-white w-full py-3.5 rounded-xl font-bold hover:bg-slate-900 transition flex justify-center items-center gap-2 shadow-md">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i> ทำรายการใหม่
                </button>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let apiKey = localStorage.getItem('bp_api_key') || '';
        let imageFile = null;
        let tableData = [];
        let showKey = false;

        const apiKeyInput = document.getElementById('apiKeyInput');
        const toggleKeyBtn = document.getElementById('toggleKeyBtn');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const saveStatus = document.getElementById('saveStatus');
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const previewArea = document.getElementById('previewArea');
        const previewImage = document.getElementById('previewImage');
        const processBtn = document.getElementById('processBtn');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        apiKeyInput.value = apiKey;

        const tableHeader = document.getElementById('tableHeader');
        for (let i = 1; i <= 12; i++) {
            const th = document.createElement('th');
            th.className = "p-3 border-b border-r border-slate-200 text-slate-600 font-bold whitespace-nowrap bg-slate-50";
            th.innerText = `คอลัมน์ ${i}`;
            tableHeader.appendChild(th);
        }

        toggleKeyBtn.addEventListener('click', () => {
            showKey = !showKey;
            apiKeyInput.type = showKey ? 'text' : 'password';
            toggleKeyBtn.innerHTML = showKey ? '<i data-lucide="eye-off" class="w-5 h-5"></i>' : '<i data-lucide="eye" class="w-5 h-5"></i>';
            lucide.createIcons();
        });

        saveKeyBtn.addEventListener('click', () => {
            apiKey = apiKeyInput.value.trim();
            localStorage.setItem('bp_api_key', apiKey);
            saveStatus.classList.remove('hidden');
            setTimeout(() => saveStatus.classList.add('hidden'), 3000);
        });

        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                imageFile = e.target.files[0];
                previewImage.src = URL.createObjectURL(imageFile);
                uploadArea.classList.add('hidden');
                previewArea.classList.remove('hidden');
                errorBox.classList.add('hidden');
            }
        });

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
        });

        processBtn.addEventListener('click', async () => {
            if (!apiKey) { errorText.innerText = 'กรุณากรอก API Key'; errorBox.classList.remove('hidden'); return; }
            processBtn.disabled = true;
            processBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> วิเคราะห์...';
            lucide.createIcons();

            try {
                const base64Data = await fileToBase64(imageFile);
                // อัปเดตโมเดลเป็น gemini-2.0-flash
                const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
                
                const response = await fetch(GEMINI_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [
                            { text: "อ่านตารางความดันโลหิต (7แถว, 13คอลัมน์, ข้าม 2 แถวแรก, ส่งกลับ JSON Array ของตัวเลขเท่านั้น ห้ามใส่ข้อความ)" }, 
                            { inlineData: { mimeType: imageFile.type, data: base64Data } }
                        ]}],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error('API Error');
                const result = await response.json();
                let responseText = result.candidates[0].content.parts[0].text;
                responseText = responseText.replace(/```json/g, '').replace(/```/g, '').trim();
                tableData = JSON.parse(responseText);
                renderTable();
                step1.classList.add('hidden');
                step2.classList.remove('hidden');
            } catch (err) {
                errorText.innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อ: ' + err.message;
                errorBox.classList.remove('hidden');
            } finally {
                processBtn.disabled = false;
                processBtn.innerHTML = 'วิเคราะห์ข้อมูล';
            }
        });

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            tableData.forEach((row) => {
                const tr = document.createElement('tr');
                for (let c = 0; c < 12; c++) {
                    const td = document.createElement('td');
                    td.className = "border-b border-r border-slate-200 p-3 text-slate-700";
                    td.innerText = (row[c] === null || row[c] === undefined) ? '-' : row[c];
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });
        }

        document.getElementById('backBtn').addEventListener('click', () => { step2.classList.add('hidden'); step1.classList.remove('hidden'); });
        document.getElementById('calcBtn').addEventListener('click', () => {
            let sysSum = 0, diaSum = 0, hrSum = 0, count = 0;
            tableData.forEach(row => {
                for (let i = 0; i < 4; i++) {
                    const sys = Number(row[i * 3]), dia = Number(row[i * 3 + 1]), hr = Number(row[i * 3 + 2]);
                    if (sys && dia) { sysSum += sys; diaSum += dia; hrSum += (hr || 0); count++; }
                }
            });
            document.getElementById('resSysDia').innerText = `${Math.round(sysSum/count)} / ${Math.round(diaSum/count)}`;
            document.getElementById('resHr').innerText = `ชีพจร: ${Math.round(hrSum/count)} ครั้ง/นาที`;
            step2.classList.add('hidden'); step3.classList.remove('hidden');
        });
        document.getElementById('restartBtn').addEventListener('click', () => window.location.reload());
    </script>
</body>
</html>
